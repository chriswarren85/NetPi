{% extends 'base.html' %}
{% block title %}— NTP Status{% endblock %}
{% block content %}
<div class="page-title">NTP status</div>
<div class="page-sub">Time synchronisation status for this Pi</div>
<div class="panel">
  <div class="panel-header">Timesync status</div>
  <div class="panel-body">
    <div class="output-box">{{ status }}</div>
  </div>
</div>
<div class="panel">
  <div class="panel-header">Configured NTP server</div>
  <div class="panel-body">
    <p style="font-family:monospace;font-size:14px;color:#60a5fa">{{ s.ntp_server }}</p>
    <p style="font-size:12px;color:#6b7280;margin-top:0.5rem">Point your AV devices at this IP for network time sync</p>
  </div>
</div>
{% endblock %}
