{% extends 'base.html' %}
{% block title %}— LAN Sheet{% endblock %}
{% block content %}
<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:4px">
  <div>
    <div class="page-title">Project LAN Sheet</div>
    <div class="page-sub">Committed IP register · <span style="color:#6b7280">{{ project_id }}</span></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;padding-top:4px">
    <button class="btn btn-primary" onclick="syncFromDeviceList()">Sync from Device List</button>
    <button class="btn" onclick="createVlanGroups()">Create VLAN Groups for Project</button>
    <a class="btn" href="/tools/intake#paste-list-panel">Paste Import</a>
    <a class="btn" href="/tools/devices">Device List</a>
    <select id="ls-scan-mode-select" style="width:140px" title="Scan mode">
      <option value="av_port_probe">AV Port Probe</option>
      <option value="standard">Standard</option>
      <option value="deep_fingerprint">Deep Fingerprint</option>
    </select>
    <button id="btn-scan-selected" class="btn" disabled title="Scan checked rows">⟳ Scan Selected (<span id="scan-selected-count">0</span>)</button>
    <button id="btn-copy-ips" class="btn" disabled title="Copy selected IPs to clipboard" onclick="copySelectedIPs()">Copy IPs</button>
    <button id="btn-scan-all" class="btn" title="Scan all visible rows">⟳ Scan All</button>
    <button class="btn btn-danger" onclick="clearLanSheet()">Clear LAN Sheet</button>
  </div>
</div>

<div id="sheet-status" style="display:none;font-size:13px;margin:10px 0;padding:10px 12px;border-radius:8px;background:#141414;color:#d1d5db;border:1px solid #374151"></div>

<div class="panel">
  <div class="panel-body" style="padding:10px 14px">
    <div id="sheet-stats" style="display:flex;gap:20px;flex-wrap:wrap;font-size:13px;color:#9ca3af">Loading…</div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">Filter</div>
  <div class="panel-body">
    <div class="form-row">
      <div class="form-group" style="flex:2;min-width:180px">
        <label>Search</label>
        <input id="f-search" oninput="applyFilters()" placeholder="Name, IP, type, notes…">
      </div>
      <div class="form-group">
        <label>VLAN</label>
        <select id="f-vlan" onchange="applyFilters()">
          <option value="">All VLANs</option>
          {% for v in vlans %}
          <option value="{{ v.name }}">{{ v.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Area / Room</label>
        <select id="f-room" onchange="applyFilters()">
          <option value="">All Rooms</option>
        </select>
      </div>
      <div class="form-group">
        <label>Status</label>
        <select id="f-status" onchange="applyFilters()">
          <option value="">All</option>
          <option value="present">Present</option>
          <option value="missing">Missing</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="panel">
  <div class="panel-header">
    <span id="table-count" style="font-size:13px;color:#9ca3af"></span>
    <div style="display:flex;align-items:center;gap:14px">
      <label style="display:flex;align-items:center;gap:6px;font-weight:400;font-size:12px;color:#9ca3af;cursor:pointer;margin:0">
        <input type="checkbox" id="group-by-room" onchange="renderSheet()" checked> Group by Area / Room
      </label>
    </div>
  </div>
  <div class="panel-body" style="padding:0;overflow-x:auto">
    <div id="lan-empty-wrap">
    <table id="lan-table" style="font-size:11px;table-layout:fixed">
      <thead>
        <tr id="lan-thead-row">
          <!-- built by JS so widths/fields stay in sync with LC_COLS -->
        </tr>
      </thead>
      <tbody id="lan-tbody">
        <tr><td colspan="14" style="color:#6b7280;text-align:center;padding:1.5rem">Loading…</td></tr>
      </tbody>
    </table>
    </div>
  </div>
</div>

<style>
/* ── LAN Sheet grid ──────────────────────────────────────── */
#lan-table td.lce { cursor: cell; padding: 0; }
#lan-table td.lce .lcv {
  display: block; padding: 5px 8px; min-height: 24px; min-width: 60px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#lan-table td.lce.lc-active { outline: 2px solid #3b82f6; outline-offset: -1px; background: #111827; }
#lan-table td.lce.lc-dirty  { background: #1a1a0a; }
#lan-table td.lce input, #lan-table td.lce select {
  width: 100%; padding: 4px 6px; background: #111827; color: var(--text);
  border: none; outline: none; font-size: 11px; font-family: inherit;
  min-width: 60px; box-sizing: border-box;
}
#lan-table tr.lc-new-row td { background: #0a1a0a; }
.scan-status { font-size: 0.85em; white-space: nowrap; }
.scan-status.online   { color: var(--color-pass); }
.scan-status.offline  { color: var(--text-muted); }
.scan-status.scanning { color: var(--color-info); }
.scan-status.error    { color: var(--color-critical); }
</style>
<script>
// ── W23.3 empty-state helpers ────────────────────────────────────────────────
function renderEmptyState(containerId, config) {
  var container = document.getElementById(containerId);
  if (!container) return;
  var existing = container.querySelector('.empty-state-panel');
  if (existing) existing.remove();
  var panel = document.createElement('div');
  panel.className = 'empty-state-panel';
  panel.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;gap:12px';
  var title = document.createElement('div');
  title.style.cssText = 'font-size:0.9375rem;font-weight:600;color:#e2e8f0';
  title.textContent = config.title;
  var body = document.createElement('div');
  body.style.cssText = 'font-size:0.875rem;color:#94a3b8;max-width:360px;line-height:1.5';
  body.textContent = config.body;
  var actions = document.createElement('div');
  actions.style.cssText = 'display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px';
  (config.actions || []).forEach(function(action) {
    var btn = document.createElement('a');
    btn.href = action.href || '#';
    if (action.onclick) { btn.setAttribute('onclick', action.onclick + ';return false;'); }
    btn.textContent = action.label;
    btn.style.cssText = 'padding:6px 14px;border-radius:4px;font-size:0.8rem;text-decoration:none;cursor:pointer;' + (action.primary ? 'background:#2dd4bf;color:#000;font-weight:600' : 'border:1px solid #2d3748;color:#94a3b8');
    actions.appendChild(btn);
  });
  panel.appendChild(title); panel.appendChild(body); panel.appendChild(actions);
  container.appendChild(panel);
}
function clearEmptyState(containerId) {
  var container = document.getElementById(containerId);
  if (!container) return;
  var existing = container.querySelector('.empty-state-panel');
  if (existing) existing.remove();
}

let lanEntries = [];
let filtered = [];
let sortState = { col: 'room', dir: 'asc' };

/* Column definitions for the editable grid */
const LC_COLS = [
  { field: 'room',        label: 'Area / Room',      w: '120px' },
  { field: 'name',        label: 'Device',            w: '130px' },
  { field: 'location',    label: 'Location',          w: '100px' },
  { field: 'vendor',      label: 'Make',              w: '90px'  },
  { field: 'model',       label: 'Model',             w: '110px' },
  { field: 'vlan',        label: 'VLAN',              w: '90px', type: 'vlan' },
  { field: 'ip',          label: 'IP',                w: '110px', mono: true, readonly: true },
  { field: 'multicast',   label: 'Multicast',         w: '80px'  },
  { field: 'hostname',    label: 'Hostname',          w: '120px', mono: true },
  { field: 'mac',         label: 'MAC',               w: '130px', mono: true },
  { field: 'serial',      label: 'Serial',            w: '100px' },
  { field: 'switch_port', label: 'Switch / Port',     w: '110px', mono: true },
  { field: 'poe_type',    label: 'PoE',               w: '70px'  },
];

/* Collect VLAN names from the page settings options (pre-rendered by Jinja) */
const LC_VLANS = [...document.querySelectorAll('#f-vlan option')].map(o=>o.value).filter(Boolean);

let lcActiveRow = -1; // index into `filtered`
let lcActiveCol = -1; // index into LC_COLS
let lcDirty     = {}; // {ip: {field: true}} — tracks unsaved changes

function escHtml(s){
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showStatus(msg, tone){
  const el = document.getElementById('sheet-status');
  if(!el) return;
  el.style.display = msg ? 'block' : 'none';
  el.textContent = msg || '';
  el.style.borderColor = tone === 'error' ? '#7f1d1d' : '#374151';
  el.style.color = tone === 'error' ? '#e5e7eb' : '#d1d5db';
}

function ipToNum(ip){
  const p = (ip || '').split('.').map(Number);
  return p.length === 4 ? p.reduce((a,v) => a*256+v, 0) : 0;
}

function setSort(col){
  if(sortState.col === col){
    sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  } else {
    sortState.col = col;
    sortState.dir = 'asc';
  }
  renderSheet();
}

function sortEntries(entries){
  const { col, dir } = sortState;
  return [...entries].sort((a, b) => {
    let av, bv;
    if(col === 'ip'){
      av = ipToNum(a.ip); bv = ipToNum(b.ip);
      return dir === 'asc' ? av - bv : bv - av;
    }
    if(col === 'status'){
      // missing first when asc
      av = a.present ? 1 : 0; bv = b.present ? 1 : 0;
      return dir === 'asc' ? av - bv : bv - av;
    }
    if(col === 'vendor'){
      av = [a.vendor, a.model].filter(Boolean).join(' ').toLowerCase();
      bv = [b.vendor, b.model].filter(Boolean).join(' ').toLowerCase();
    } else {
      av = String(a[col] || '').toLowerCase();
      bv = String(b[col] || '').toLowerCase();
    }
    if(av < bv) return dir === 'asc' ? -1 : 1;
    if(av > bv) return dir === 'asc' ? 1 : -1;
    // Secondary sort: room then name
    const ra = String(a.room || '').toLowerCase();
    const rb = String(b.room || '').toLowerCase();
    if(ra < rb) return -1; if(ra > rb) return 1;
    const na = String(a.name || '').toLowerCase();
    const nb = String(b.name || '').toLowerCase();
    return na < nb ? -1 : na > nb ? 1 : 0;
  });
}

function buildThead(){
  const tr = document.getElementById('lan-thead-row');
  if(!tr) return;
  const sortable = new Set(['room','name','location','vendor','vlan','ip','hostname','switch_port','status']);
  let html = '<th style="width:32px;text-align:center;padding:4px"><input type="checkbox" id="check-all-rows" title="Select all"></th>';
  LC_COLS.forEach(col => {
    const s = sortable.has(col.field);
    const arrow = sortState.col === col.field ? (sortState.dir === 'asc' ? ' ▲' : ' ▼') : '';
    html += `<th style="width:${col.w};${s?'cursor:pointer;':''}white-space:nowrap"${s?` onclick="setSort('${col.field}')"`:''}>${escHtml(col.label)}${arrow}</th>`;
  });
  html += `<th style="width:70px">Status</th><th style="width:46px">Scan</th><th style="width:90px"></th><th style="width:68px"></th>`;
  tr.innerHTML = html;
}

function updateSortIndicators(){ buildThead(); }

function applyFilters(){
  const search = String(document.getElementById('f-search').value || '').toLowerCase().trim();
  const vlan = document.getElementById('f-vlan').value || '';
  const room = document.getElementById('f-room').value || '';
  const status = document.getElementById('f-status').value || '';

  filtered = lanEntries.filter(e => {
    if(vlan && e.vlan !== vlan) return false;
    if(room && e.room !== room) return false;
    if(status === 'present' && !e.present) return false;
    if(status === 'missing' && e.present) return false;
    if(search){
      const hay = [e.room, e.name, e.location, e.vendor, e.model, e.vlan, e.ip,
                   e.hostname, e.mac, e.serial, e.switch_port, e.notes].join(' ').toLowerCase();
      if(!hay.includes(search)) return false;
    }
    return true;
  });

  renderSheet();
}

function populateRoomFilter(){
  const rooms = [...new Set(lanEntries.map(e => e.room).filter(Boolean))].sort();
  const sel = document.getElementById('f-room');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All Rooms</option>' + rooms.map(r =>
    `<option value="${escHtml(r)}"${r === cur ? ' selected' : ''}>${escHtml(r)}</option>`
  ).join('');
}

function populateVlanFilter(){
  const dataVlans = [...new Set(lanEntries.map(e => e.vlan).filter(Boolean))].sort();
  const sel = document.getElementById('f-vlan');
  const cur = sel.value;
  // Keep settings-based options but add any additional from data
  const existing = new Set([...sel.options].map(o => o.value).filter(Boolean));
  dataVlans.forEach(v => {
    if(!existing.has(v)){
      const opt = document.createElement('option');
      opt.value = v; opt.textContent = v;
      sel.appendChild(opt);
    }
  });
  sel.value = cur;
}

function updateStats(){
  const total = lanEntries.length;
  const present = lanEntries.filter(e => e.present).length;
  const missing = total - present;

  // VLAN breakdown
  const byVlan = {};
  lanEntries.forEach(e => {
    const v = e.vlan || '(no VLAN)';
    byVlan[v] = (byVlan[v] || 0) + 1;
  });

  const el = document.getElementById('sheet-stats');
  if(!el) return;

  let html = `<span><strong style="color:#e5e7eb">${total}</strong> devices</span>`;
  html += `<span style="color:#86efac"><strong>${present}</strong> present</span>`;
  html += `<span style="color:#fca5a5"><strong>${missing}</strong> missing</span>`;
  html += '<span style="color:#374151">|</span>';
  Object.keys(byVlan).sort().forEach(v => {
    html += `<span style="color:#a5b4fc">${escHtml(v)}: <strong>${byVlan[v]}</strong></span>`;
  });
  el.innerHTML = html;
}

/* ─── Excel-like grid cell builder ──────────────────────────── */
function buildEntryRow(e, rowIdx){
  const rawIp  = e.ip || '';
  const safeIp = escHtml(rawIp);
  const statusBg    = e.present ? '#0d2015' : '#1a0d0d';
  const statusColor = e.present ? '#86efac' : '#fca5a5';

  let html = `<tr data-row-ip="${safeIp}">`;
  html += `<td style="width:32px;text-align:center;padding:4px;vertical-align:middle"><input type="checkbox" class="row-check" data-ip="${safeIp}"></td>`;
  LC_COLS.forEach((col, colIdx) => {
    const val  = String(e[col.field] || '');
    const isDirty = lcDirty[rawIp] && lcDirty[rawIp][col.field];
    const mono = col.mono ? 'font-family:monospace;' : '';
    let cellInner;
    if(col.field === 'ip' && val){
      cellInner = `<span class="lcv" style="${mono}color:#e5e7eb">${escHtml(val)}`
        + `<a href="http://${escHtml(val)}" target="_blank" rel="noopener"`
        + ` onclick="event.stopPropagation()" title="Open device web UI"`
        + ` style="margin-left:5px;color:#475569;text-decoration:none;font-size:10px">↗</a></span>`;
    } else {
      cellInner = `<span class="lcv" style="${mono}color:${val?'#e5e7eb':'#374151'}">${val ? escHtml(val) : '—'}</span>`;
    }
    html += `<td class="lce${isDirty?' lc-dirty':''}" data-row="${rowIdx}" data-col="${colIdx}" data-ip="${safeIp}" data-field="${escHtml(col.field)}">`
      + cellInner + `</td>`;
  });

  // Status (read-only) + Scan button + Scan status + Remove button
  html += `<td class="device-status-cell" style="white-space:nowrap"><span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;background:${statusBg};color:${statusColor}">${e.present?'Present':'Missing'}</span></td>`;
  html += `<td style="text-align:center;vertical-align:middle"><button class="btn btn-scan-ip" data-ip="${safeIp}" title="Scan this IP" style="font-size:13px;padding:1px 6px;line-height:1.4;min-width:28px">⟳</button></td>`;
  html += `<td class="scan-status-cell" style="white-space:nowrap;vertical-align:middle"></td>`;
  html += `<td><button class="btn btn-danger" style="font-size:11px;padding:2px 8px;white-space:nowrap" onclick="removeEntry('${rawIp.replace(/'/g,"\\'")}')">Remove</button></td>`;
  html += '</tr>';
  return html;
}

function renderSheet(){
  clearEmptyState('lan-empty-wrap');
  var _lanTable = document.getElementById('lan-table');
  if(_lanTable) _lanTable.style.display = '';
  buildThead();
  const tbody = document.getElementById('lan-tbody');
  const groupByRoom = document.getElementById('group-by-room').checked;
  const colCount = LC_COLS.length + 5;

  document.getElementById('table-count').textContent =
    filtered.length + ' device' + (filtered.length !== 1 ? 's' : '') +
    (filtered.length < lanEntries.length ? ' (filtered from ' + lanEntries.length + ')' : '');

  if(!filtered.length){
    if(!lanEntries.length){
      if(_lanTable) _lanTable.style.display = 'none';
      renderEmptyState('lan-empty-wrap', {
        title: 'No LAN sheet entries yet',
        body: 'The LAN sheet is your design register and the source of truth for all generated deliverables. Add devices manually or import from the intake workflow.',
        actions: [
          { label: '+ Add device',  onclick: 'lcAddRow()', primary: true },
          { label: 'Paste Import',  href: '/tools/devices#intake' }
        ]
      });
      return;
    }
    tbody.innerHTML = `<tr><td colspan="${colCount}" style="color:#4b5563;text-align:center;padding:1.5rem">No entries match the current filters.</td></tr>`;
    _appendAddRow(tbody, colCount);
    updateBatchButtons();
    return;
  }

  const sorted = sortEntries(filtered);
  // Re-index filtered to match sorted order for cell navigation
  filtered = sorted;

  if(groupByRoom){
    const groups = {}, ORDER = [];
    sorted.forEach(e => {
      const r = e.room || '(No room)';
      if(!groups[r]){ groups[r] = []; ORDER.push(r); }
      groups[r].push(e);
    });
    let html = '';
    let rowIdx = 0;
    ORDER.forEach(room => {
      const devs = groups[room];
      const missing = devs.filter(d => !d.present).length;
      const mSpan = missing > 0 ? ` <span style="color:#fca5a5;font-weight:400">(${missing} missing)</span>` : '';
      html += `<tr class="ls-group-header" data-group-header="true" data-group-room="${escHtml(room)}" style="background:#0f172a;border-top:2px solid #374151;pointer-events:none">
        <td colspan="100" style="padding:4px 12px;font-weight:600;color:#94a3b8;font-size:11px;letter-spacing:.06em;text-transform:uppercase">
          ${escHtml(room)}<span style="color:#4b5563;font-weight:400"> — ${devs.length} device${devs.length!==1?'s':''}</span>${mSpan}
        </td></tr>`;
      devs.forEach(e => { html += buildEntryRow(e, rowIdx++); });
    });
    tbody.innerHTML = html;
  } else {
    tbody.innerHTML = sorted.map((e, i) => buildEntryRow(e, i)).join('');
  }
  _appendAddRow(tbody, colCount);
  updateBatchButtons();
}

function _appendAddRow(tbody, colCount){
  const tr = document.createElement('tr');
  tr.className = 'lc-new-row';
  tr.innerHTML = `<td colspan="100" style="padding:4px 8px">
    <button class="btn" style="font-size:11px;padding:3px 12px;color:#6b7280;border-color:#2d2d2d" onclick="lcAddRow()">+ Add Row</button>
  </td>`;
  tbody.appendChild(tr);
}

async function loadSheet(){
  try {
    const res = await fetch('/tools/api/lan-sheet');
    const data = await res.json();
    if(!data.ok){ showStatus('Failed to load LAN sheet.', 'error'); return; }
    lanEntries = Array.isArray(data.entries) ? data.entries : [];
    if(lanEntries.length > 0 && lanEntries.some(e => !e.vlan)){
      await _autoInferVlans();
      return;
    }
    populateRoomFilter();
    populateVlanFilter();
    updateStats();
    applyFilters();
  } catch(e) {
    showStatus('Request failed: ' + e, 'error');
  }
}

async function _autoInferVlans(){
  try {
    const res = await fetch('/tools/api/lan-sheet/infer-vlans', {method:'POST'});
    const data = await res.json();
    if(data.ok) lanEntries = Array.isArray(data.entries) ? data.entries : [];
  } catch(e) {}
  populateRoomFilter();
  populateVlanFilter();
  updateStats();
  applyFilters();
}

function removeEntry(ip){
  fetch('/tools/api/lan-sheet/remove', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ip})
  }).then(r => r.json()).then(d => {
    if(d.ok){
      lanEntries = lanEntries.filter(e => e.ip !== ip);
      populateRoomFilter();
      populateVlanFilter();
      updateStats();
      applyFilters();
    } else {
      showStatus('Remove failed: ' + (d.error || '?'), 'error');
    }
  }).catch(() => showStatus('Request failed', 'error'));
}

async function clearLanSheet(){
  if(!confirm('Clear the entire LAN Sheet? All ' + lanEntries.length + ' entries will be removed. This cannot be undone.')) return;
  try {
    const res = await fetch('/tools/api/lan-sheet/save', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({entries: []})
    });
    const data = await res.json();
    if(data.ok){
      lanEntries = [];
      populateRoomFilter();
      populateVlanFilter();
      updateStats();
      applyFilters();
      showStatus('LAN Sheet cleared.', 'neutral');
    } else {
      showStatus('Clear failed: ' + (data.error || '?'), 'error');
    }
  } catch(e) {
    showStatus('Request failed: ' + e, 'error');
  }
}

async function syncFromDeviceList(){
  showStatus('Syncing from device list…', 'neutral');
  try {
    const devRes = await fetch('/tools/api/devices');
    const devData = await devRes.json();
    const devices = Array.isArray(devData.devices) ? devData.devices : [];
    if(!devices.length){ showStatus('Device list is empty.', 'error'); return; }
    const entries = devices.filter(d => d.ip).map(d => ({
      name: d.name || '', ip: d.ip || '', mac: d.mac || d.mac_address || '',
      type: d.type || '', vlan: d.vlan || '', vendor: d.vendor || '',
      model: d.model || '', room: d.room || '', notes: d.notes || '',
    }));
    const res = await fetch('/tools/api/lan-sheet/add', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({entries})
    });
    const data = await res.json();
    if(data.ok){
      showStatus('Synced ' + data.total + ' devices (' + data.added + ' new, ' + data.updated + ' updated).', 'neutral');
      loadSheet();
    } else {
      showStatus('Sync failed: ' + (data.error || '?'), 'error');
    }
  } catch(e) {
    showStatus('Request failed: ' + e, 'error');
  }
}

async function createVlanGroups(){
  showStatus('Deriving VLAN groups from IP addressing…', 'neutral');
  try {
    const res = await fetch('/tools/api/lan-sheet/create-vlan-groups', {method:'POST'});
    const data = await res.json();
    if(data.ok){
      lanEntries = Array.isArray(data.entries) ? data.entries : [];
      populateRoomFilter();
      populateVlanFilter();
      updateStats();
      applyFilters();
      showStatus('VLAN groups saved — ' + data.vlans_added + ' added, ' + data.vlans_updated + ' updated (' + data.total_vlans + ' total in project settings).', 'neutral');
    } else {
      showStatus('Failed: ' + (data.error || '?'), 'error');
    }
  } catch(e) {
    showStatus('Request failed: ' + e, 'error');
  }
}

/* ─── Excel-like grid interaction ───────────────────────────────────────── */

function _lcCellEl(row, col){
  return document.querySelector(`#lan-tbody td.lce[data-row="${row}"][data-col="${col}"]`);
}

function _lcDeactivate(){
  document.querySelectorAll('#lan-tbody td.lce.lc-active').forEach(td => {
    td.classList.remove('lc-active');
    // If there's an active input/select, extract its value and commit display
    const inp = td.querySelector('input,select');
    if(inp){
      const ip    = td.dataset.ip;
      const field = td.dataset.field;
      const val   = inp.value;
      _lcCommit(ip, field, val, td);
    }
  });
}

function _lcActivate(row, col, startChar){
  if(row < 0 || col < 0 || row >= filtered.length || col >= LC_COLS.length) return;
  if(LC_COLS[col] && LC_COLS[col].readonly) return;
  _lcDeactivate();
  lcActiveRow = row;
  lcActiveCol = col;

  const td = _lcCellEl(row, col);
  if(!td) return;
  td.classList.add('lc-active');
  td.scrollIntoView({ block: 'nearest', inline: 'nearest' });

  const ip    = td.dataset.ip || '';
  const field = td.dataset.field || '';
  const colDef = LC_COLS[col];
  const entry = lanEntries.find(e => e.ip === ip) || {};
  const current = entry[field] || '';

  let widget;
  if(colDef.type === 'vlan' && LC_VLANS.length){
    widget = document.createElement('select');
    widget.innerHTML = '<option value="">—</option>'
      + LC_VLANS.map(v => `<option value="${escHtml(v)}"${v===current?' selected':''}>${escHtml(v)}</option>`).join('');
    widget.value = current;
  } else {
    widget = document.createElement('input');
    widget.type = 'text';
    widget.value = startChar !== undefined ? startChar : current;
    if(startChar === undefined){ setTimeout(()=>{ widget.select(); }, 0); }
  }

  td.innerHTML = '';
  td.appendChild(widget);
  widget.focus();

  widget.addEventListener('keydown', ev => _lcKey(ev, row, col));
  // blur: save without navigating (e.g. clicked elsewhere)
  widget.addEventListener('blur', () => {
    setTimeout(() => {
      // Only save if still active (not navigated away by keyboard)
      if(lcActiveRow === row && lcActiveCol === col){
        _lcSaveAndDeactivate(row, col);
      }
    }, 80);
  });
}

function _lcSaveAndDeactivate(row, col){
  const td = _lcCellEl(row, col);
  if(!td) return;
  const inp = td.querySelector('input,select');
  if(!inp) return;
  const ip    = td.dataset.ip;
  const field = td.dataset.field;
  _lcCommit(ip, field, inp.value, td);
  lcActiveRow = -1;
  lcActiveCol = -1;
}

function _lcCommit(ip, field, val, td){
  const entry = lanEntries.find(e => e.ip === ip);
  if(!entry) return;
  const prev = entry[field] || '';
  const newVal = val.trim();
  // Update display span
  const colDef = LC_COLS.find(c => c.field === field) || {};
  const mono = colDef.mono ? 'font-family:monospace;' : '';
  td.innerHTML = `<span class="lcv" style="${mono}color:${newVal?'#e5e7eb':'#374151'}">${newVal ? escHtml(newVal) : '—'}</span>`;
  if(newVal === prev) return; // no change, skip save
  entry[field] = newVal;
  if(!lcDirty[ip]) lcDirty[ip] = {};
  lcDirty[ip][field] = true;
  td.classList.add('lc-dirty');
  // Persist immediately via API
  fetch('/tools/api/lan-sheet/entry', {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ip, field, value: newVal})
  }).then(r => r.json()).then(d => {
    if(d.ok){
      if(lcDirty[ip]) delete lcDirty[ip][field];
      td.classList.remove('lc-dirty');
      // Re-run filters/stats in background without full re-render
      updateStats();
    }
  }).catch(() => {}); // keep dirty indicator on failure
}

function _lcKey(ev, row, col){
  const key = ev.key;
  if(key === 'Escape'){
    ev.preventDefault();
    const td = _lcCellEl(row, col);
    if(td){ const inp = td.querySelector('input,select'); if(inp) inp.value = (lanEntries.find(e=>e.ip===td.dataset.ip)||{})[td.dataset.field]||''; }
    _lcSaveAndDeactivate(row, col);
    return;
  }
  if(key === 'Tab'){
    ev.preventDefault();
    _lcSaveAndDeactivate(row, col);
    const nextCol = ev.shiftKey ? col - 1 : col + 1;
    if(nextCol < 0){ _lcActivate(row - 1, LC_COLS.length - 1); }
    else if(nextCol >= LC_COLS.length){ _lcActivate(row + 1, 0); }
    else { _lcActivate(row, nextCol); }
    return;
  }
  if(key === 'Enter'){
    ev.preventDefault();
    _lcSaveAndDeactivate(row, col);
    _lcActivate(ev.shiftKey ? row - 1 : row + 1, col);
    return;
  }
  if(key === 'ArrowUp'   && ev.altKey){ ev.preventDefault(); _lcSaveAndDeactivate(row,col); _lcActivate(row-1,col); return; }
  if(key === 'ArrowDown' && ev.altKey){ ev.preventDefault(); _lcSaveAndDeactivate(row,col); _lcActivate(row+1,col); return; }
}

// Click on any lce cell
document.addEventListener('click', ev => {
  const td = ev.target.closest('td.lce');
  if(!td) return;
  const row = parseInt(td.dataset.row, 10);
  const col = parseInt(td.dataset.col, 10);
  if(row === lcActiveRow && col === lcActiveCol) return; // already active
  if(LC_COLS[col] && LC_COLS[col].readonly) return; // read-only — link/display only
  _lcActivate(row, col);
});

// Keyboard navigation when a cell is selected but not in edit mode
document.addEventListener('keydown', ev => {
  if(lcActiveRow < 0) return;
  const active = document.activeElement;
  if(active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA')) return;
  const key = ev.key;
  if(key === 'ArrowUp')   { ev.preventDefault(); _lcActivate(lcActiveRow-1, lcActiveCol); }
  if(key === 'ArrowDown') { ev.preventDefault(); _lcActivate(lcActiveRow+1, lcActiveCol); }
  if(key === 'ArrowLeft') { ev.preventDefault(); _lcActivate(lcActiveRow, lcActiveCol-1); }
  if(key === 'ArrowRight'){ ev.preventDefault(); _lcActivate(lcActiveRow, lcActiveCol+1); }
});

// Typing while a cell is selected (but not yet in input) — start editing immediately
document.addEventListener('keypress', ev => {
  if(lcActiveRow < 0) return;
  const active = document.activeElement;
  if(active && (active.tagName === 'INPUT' || active.tagName === 'SELECT' || active.tagName === 'TEXTAREA')) return;
  if(ev.ctrlKey || ev.metaKey || ev.altKey) return;
  if(ev.key.length === 1){
    ev.preventDefault();
    _lcActivate(lcActiveRow, lcActiveCol, ev.key);
  }
});

/* Add a blank row */
function lcAddRow(){
  // Inherit room from the active room filter or the last group-header visible in the table
  const roomFilter = (document.getElementById('f-room') || {}).value || '';
  let inheritRoom = (roomFilter && roomFilter !== '') ? roomFilter : '';
  if(!inheritRoom){
    const headers = document.querySelectorAll('tr[data-group-header="true"]');
    if(headers.length) inheritRoom = headers[headers.length - 1].dataset.groupRoom || '';
  }
  const blank = { name:'', ip:'', mac:'', type:'', vlan:'', vendor:'', model:'', room: inheritRoom,
                  hostname:'', serial:'', switch_port:'', multicast:'', poe_type:'', location:'', notes:'', present: false };
  lanEntries.push(blank);
  populateRoomFilter();
  populateVlanFilter();
  applyFilters();
  // Activate first cell of the new last row
  setTimeout(() => _lcActivate(filtered.length - 1, 0), 40);
}

/* ─── Per-row IP scan ──────────────────────────────────────────────────────── */

async function scanLanSheetIp(ip, rowEl) {
  const btn = rowEl.querySelector('.btn-scan-ip');
  const statusCell = rowEl.querySelector('.scan-status-cell');
  if (!btn || !statusCell) return;

  btn.disabled = true;
  statusCell.innerHTML = '<span class="scan-status scanning">⟳ Scanning…</span>';
  window.netpiStatus && window.netpiStatus.startTimer('Scanning ' + ip);

  try {
    const lsScanMode = document.getElementById('ls-scan-mode-select')?.value || 'av_port_probe';
    const startRes = await fetch('/tools/api/lan_sheet/scan_ips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ips: [ip], scan_mode: lsScanMode })
    });
    const startData = await startRes.json();
    if (!startData.ok || !startData.job_id) {
      statusCell.innerHTML = '<span class="scan-status error">✗ Error</span>';
      btn.disabled = false;
      return;
    }
    await pollScanJob(startData.job_id, ip, rowEl, statusCell, btn);
  } catch (e) {
    statusCell.innerHTML = '<span class="scan-status error">✗ Failed</span>';
    btn.disabled = false;
  } finally {
    window.netpiStatus && window.netpiStatus.stopTimer();
  }
}

async function pollScanJob(jobId, ip, rowEl, statusCell, btn) {
  const MAX_POLLS = 60;
  const INTERVAL_MS = 500;
  for (let i = 0; i < MAX_POLLS; i++) {
    await new Promise(r => setTimeout(r, INTERVAL_MS));
    try {
      const res = await fetch(`/tools/api/discover_hosts/status/${jobId}`);
      const data = await res.json();
      const status = data.status || '';
      if (status === 'completed' || status === 'failed' || status === 'cancelled') {
        applyRowScanResult(data, ip, rowEl, statusCell, btn);
        return;
      }
    } catch (e) { /* transient — keep polling */ }
  }
  statusCell.innerHTML = '<span class="scan-status error">✗ Timed out</span>';
  btn.disabled = false;
}

function applyRowScanResult(data, ip, rowEl, statusCell, btn) {
  btn.disabled = false;
  const devices = data.devices || [];
  const match = devices.find(d => (d.ip || '').trim() === ip.trim());

  const statusColCell = rowEl.querySelector('.device-status-cell');
  if (!match) {
    if (statusColCell) statusColCell.innerHTML = '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;background:#1a0d0d;color:#fca5a5">No response</span>';
    statusCell.innerHTML = '';
    return;
  }

  if (statusColCell) statusColCell.innerHTML = '<span style="display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;background:#0d2015;color:#86efac">Online</span>';
  statusCell.innerHTML = '';

  const nowIso = new Date().toISOString();
  patchLanSheetField(ip, 'last_seen', nowIso);

  if (match.hostname) {
    const hostnameCell = rowEl.querySelector('[data-field="hostname"]');
    if (hostnameCell) hostnameCell.querySelector('.lcv').textContent = match.hostname;
    patchLanSheetField(ip, 'hostname', match.hostname);
  }

  if (match.vendor) {
    const vendorCell = rowEl.querySelector('[data-field="vendor"]');
    if (vendorCell) vendorCell.querySelector('.lcv').textContent = match.vendor;
    patchLanSheetField(ip, 'vendor', match.vendor);
  }

  if (match.mac) {
    const macCell = rowEl.querySelector('[data-field="mac"]');
    if (macCell) macCell.querySelector('.lcv').textContent = match.mac;
    // mac is not in the PATCH allowed list — display only
  }
}

async function patchLanSheetField(ip, field, value) {
  try {
    await fetch('/tools/api/lan-sheet/entry', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ip, field, value })
    });
  } catch (e) { /* best-effort — display already updated */ }
}

document.addEventListener('click', function(e) {
  const btn = e.target.closest('.btn-scan-ip');
  if (!btn) return;
  const row = btn.closest('tr');
  const ip = btn.dataset.ip;
  if (ip && row) scanLanSheetIp(ip, row);
});

/* ─── Batch scan ─────────────────────────────────────────────────────────── */

function updateBatchButtons() {
  const checked = document.querySelectorAll('.row-check:checked');
  const btn = document.getElementById('btn-scan-selected');
  const copyBtn = document.getElementById('btn-copy-ips');
  const countSpan = document.getElementById('scan-selected-count');
  if (btn) btn.disabled = checked.length === 0;
  if (copyBtn) copyBtn.disabled = checked.length === 0;
  if (countSpan) countSpan.textContent = checked.length;
}

function copySelectedIPs() {
  const ips = [...document.querySelectorAll('.row-check:checked')]
    .map(cb => cb.dataset.ip)
    .filter(Boolean)
    .join('\n');
  if (!ips) return;
  navigator.clipboard.writeText(ips)
    .then(() => {
      window.netpiStatus && window.netpiStatus.post('IPs copied to clipboard', 'success');
    })
    .catch(() => { alert('Copy failed — select IPs manually.'); });
}

async function batchScanIps(ips) {
  if (!ips || ips.length === 0) return;

  const btnSelected = document.getElementById('btn-scan-selected');
  const btnAll = document.getElementById('btn-scan-all');
  if (btnSelected) btnSelected.disabled = true;
  if (btnAll) btnAll.disabled = true;
  window.netpiStatus && window.netpiStatus.startTimer('Scanning ' + ips.length + ' IP' + (ips.length !== 1 ? 's' : ''));

  ips.forEach(ip => {
    const row = document.querySelector(`tr[data-row-ip="${ip}"]`);
    if (!row) return;
    const statusCell = row.querySelector('.scan-status-cell');
    const scanBtn = row.querySelector('.btn-scan-ip');
    if (statusCell) statusCell.innerHTML = '<span class="scan-status scanning">⟳ Scanning…</span>';
    if (scanBtn) scanBtn.disabled = true;
  });

  try {
    const lsScanMode = document.getElementById('ls-scan-mode-select')?.value || 'av_port_probe';
    const startRes = await fetch('/tools/api/lan_sheet/scan_ips', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ips, scan_mode: lsScanMode })
    });
    const startData = await startRes.json();
    if (!startData.ok || !startData.job_id) {
      ips.forEach(ip => markRowError(ip));
      return;
    }

    const finalData = await pollBatchJob(startData.job_id);
    const devices = (finalData && finalData.devices) || [];
    ips.forEach(ip => {
      const row = document.querySelector(`tr[data-row-ip="${ip}"]`);
      if (!row) return;
      const statusCell = row.querySelector('.scan-status-cell');
      const scanBtn = row.querySelector('.btn-scan-ip');
      applyRowScanResult({ devices }, ip, row, statusCell, scanBtn);
    });

  } catch(e) {
    ips.forEach(ip => markRowError(ip));
  } finally {
    if (btnAll) btnAll.disabled = false;
    updateBatchButtons();
    window.netpiStatus && window.netpiStatus.stopTimer();
  }
}

async function pollBatchJob(jobId) {
  const MAX_POLLS = 120;
  const INTERVAL_MS = 500;
  for (let i = 0; i < MAX_POLLS; i++) {
    await new Promise(r => setTimeout(r, INTERVAL_MS));
    try {
      const res = await fetch(`/tools/api/discover_hosts/status/${jobId}`);
      const data = await res.json();
      const status = data.status || '';
      if (status === 'completed' || status === 'failed' || status === 'cancelled') {
        return data;
      }
    } catch(e) { /* keep polling on transient error */ }
  }
  return null;
}

function markRowError(ip) {
  const row = document.querySelector(`tr[data-row-ip="${ip}"]`);
  if (!row) return;
  const statusCell = row.querySelector('.scan-status-cell');
  const scanBtn = row.querySelector('.btn-scan-ip');
  if (statusCell) statusCell.innerHTML = '<span class="scan-status error">✗ Failed</span>';
  if (scanBtn) scanBtn.disabled = false;
}

document.addEventListener('change', function(e) {
  if (e.target.id === 'check-all-rows') {
    document.querySelectorAll('.row-check').forEach(cb => {
      cb.checked = e.target.checked;
    });
    updateBatchButtons();
  }
  if (e.target.classList.contains('row-check')) {
    updateBatchButtons();
    const all = document.querySelectorAll('.row-check');
    const checked = document.querySelectorAll('.row-check:checked');
    const selectAll = document.getElementById('check-all-rows');
    if (selectAll) {
      selectAll.indeterminate = checked.length > 0 && checked.length < all.length;
      selectAll.checked = checked.length === all.length && all.length > 0;
    }
  }
});

document.getElementById('btn-scan-selected')
  ?.addEventListener('click', function() {
    const ips = [...document.querySelectorAll('.row-check:checked')]
      .map(cb => cb.dataset.ip)
      .filter(Boolean);
    batchScanIps(ips);
  });

document.getElementById('btn-scan-all')
  ?.addEventListener('click', function() {
    const ips = [...document.querySelectorAll('.row-check')]
      .map(cb => cb.dataset.ip)
      .filter(Boolean);
    batchScanIps(ips);
  });

loadSheet();

/* ─── LAN sheet scan mode persistence ────────────────────────────────────── */
const LS_SCAN_MODE_KEY = 'netpi.ls_scan_mode';

(function() {
  const saved = localStorage.getItem(LS_SCAN_MODE_KEY);
  const sel = document.getElementById('ls-scan-mode-select');
  if (sel && saved && sel.querySelector(`option[value="${saved}"]`)) {
    sel.value = saved;
  }
})();

document.getElementById('ls-scan-mode-select')
  ?.addEventListener('change', function() {
    localStorage.setItem(LS_SCAN_MODE_KEY, this.value);
  });
</script>
