{% extends 'base.html' %}
{% block title %}— Device Scanner{% endblock %}
{% block content %}
<div class="page-title">Device scanner</div>
<div class="page-sub">Scan a VLAN subnet to find all active devices</div>
<div class="panel">
  <div class="panel-header">Scan settings</div>
  <div class="panel-body">
    <div class="form-row">
      <div class="form-group">
        <label>Select VLAN</label>
        <select id="vlan-select" onchange="fillSubnet()">
          <option value="">-- select VLAN --</option>
          {% for v in s.vlans %}
          {% if v.subnet %}
          <option value="{{ v.subnet }}" data-name="{{ v.name }}">{{ v.name }} — {{ v.subnet }}</option>
          {% endif %}
          {% endfor %}
          <option value="custom">Custom subnet...</option>
        </select>
      </div>
      <div class="form-group">
        <label>Subnet</label>
        <input id="subnet-input" placeholder="e.g. 192.168.1.0/24">
      </div>
      <div class="form-group" style="display:flex;align-items:flex-end">
        <button class="btn btn-primary" onclick="startScan()" id="scan-btn">Scan</button>
      </div>
    </div>
  </div>
</div>
<div class="cards" id="scan-cards" style="display:none">
  <div class="card"><div class="card-label">Devices found</div><div class="card-value" id="c-total">0</div></div>
  <div class="card"><div class="card-label">Online</div><div class="card-value" id="c-online" style="color:#4ade80">0</div></div>
  <div class="card"><div class="card-label">Scan time</div><div class="card-value" id="c-time">—</div><div class="card-sub">seconds</div></div>
</div>
<div class="panel" id="results-panel" style="display:none">
  <div class="panel-header"><span>Results</span><button class="btn" onclick="exportCSV()">Export CSV</button></div>
  <div class="panel-body" style="padding:0">
    <table>
      <thead><tr><th>Status</th><th>IP address</th><th>Hostname</th><th>Actions</th></tr></thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</div>
<div id="scan-status" style="color:#6b7280;font-size:13px;margin-top:0.5rem"></div>
<script>
let scanData = [];
function fillSubnet(){
  const v = document.getElementById('vlan-select').value;
  if(v && v !== 'custom') document.getElementById('subnet-input').value = v;
  if(v === 'custom') document.getElementById('subnet-input').value = '';
}
function startScan(){
  const subnet = document.getElementById('subnet-input').value.trim();
  if(!subnet){ alert('Please enter a subnet'); return; }
  document.getElementById('scan-btn').textContent = 'Scanning...';
  document.getElementById('scan-btn').disabled = true;
  document.getElementById('scan-status').textContent = 'Scanning ' + subnet + ' — this may take up to 30 seconds...';
  document.getElementById('scan-cards').style.display = 'none';
  document.getElementById('results-panel').style.display = 'none';
  const start = Date.now();
  fetch('/tools/api/scan', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({subnet})
  }).then(r=>r.json()).then(d=>{
    const elapsed = ((Date.now()-start)/1000).toFixed(1);
    document.getElementById('scan-btn').textContent = 'Scan';
    document.getElementById('scan-btn').disabled = false;
    document.getElementById('scan-status').textContent = '';
    if(d.error){ alert('Scan error: '+d.error); return; }
    scanData = d.devices;
    document.getElementById('c-total').textContent = d.count;
    document.getElementById('c-online').textContent = d.count;
    document.getElementById('c-time').textContent = elapsed;
    document.getElementById('scan-cards').style.display = 'grid';
    document.getElementById('results-panel').style.display = 'block';
    const tbody = document.getElementById('results-body');
    tbody.innerHTML = '';
    d.devices.forEach(dev => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="badge badge-green">online</span></td>
        <td style="font-family:monospace">${dev.ip}</td>
        <td>${dev.hostname || '<span style="color:#4b5563">unknown</span>'}</td>
        <td style="display:flex;gap:6px">
          <button class="btn" onclick="pingHost('${dev.ip}')">Ping</button>
          <button class="btn" onclick="addDNS('${dev.ip}','${dev.hostname}')">Add DNS</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }).catch(e=>{
    document.getElementById('scan-btn').textContent = 'Scan';
    document.getElementById('scan-btn').disabled = false;
    document.getElementById('scan-status').textContent = 'Error: ' + e;
  });
}
function pingHost(ip){
  window.location.href = '/tools/network?host='+ip;
}
function addDNS(ip, hostname){
  window.location.href = '/tools/dns?ip='+ip+'&hostname='+hostname;
}
function exportCSV(){
  const rows = [['IP','Hostname','Status']];
  scanData.forEach(d => rows.push([d.ip, d.hostname||'', 'online']));
  const csv = rows.map(r=>r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'scan-results.csv';
  a.click();
}
</script>
{% endblock %}
